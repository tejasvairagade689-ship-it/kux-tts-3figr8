name: KUX TTS Audio Generation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'automation/tts-input.json'
  workflow_dispatch:
    inputs:
      voice:
        description: 'Voice to use (e.g. "Show host (US, m)")'
        required: false
        default: 'Show host (US, m)'

jobs:
  generate-audio:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Node dependencies
      run: npm install playwright

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Run TTS Automation
      run: xvfb-run --server-args="-screen 0 1920x1080x24 -ac" --auto-servernum -- node automation/tts-recorder.js
      timeout-minutes: 45

    - name: Upload Generated Audio
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-audio
        path: downloads/
        retention-days: 1
        if-no-files-found: warn

    - name: Upload Result JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tts-result
        path: automation/tts-result.json
        retention-days: 1
        if-no-files-found: ignore
