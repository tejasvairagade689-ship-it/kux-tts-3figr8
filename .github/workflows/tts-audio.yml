name: KUX TTS Audio Generation

on:
  workflow_dispatch:
    inputs:
      voice:
        description: 'Voice to use'
        required: false
        default: 'Show host (US, m)'

jobs:
  generate-audio:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Node dependencies
      run: npm install playwright

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Run TTS Automation
      run: xvfb-run --server-args="-screen 0 1280x720x24 -ac" --auto-servernum -- node automation/tts-recorder.js
      timeout-minutes: 20
      continue-on-error: true

    - name: Show Result
      if: always()
      run: |
        echo "=== TTS Result ==="
        cat automation/tts-result.json 2>/dev/null || echo "No result file"
        echo ""
        echo "=== Downloads ==="
        ls -la downloads/ 2>/dev/null || echo "No downloads folder"

    - name: Upload Generated Audio
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-audio
        path: downloads/*.wav
        retention-days: 1
        if-no-files-found: warn

    - name: Upload Debug Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: downloads/*.png
        retention-days: 1
        if-no-files-found: ignore

    - name: Upload Result JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tts-result
        path: automation/tts-result.json
        retention-days: 1
        if-no-files-found: ignore
