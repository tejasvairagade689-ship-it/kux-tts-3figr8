name: KUX TTS - Dynamic Matrix Strategy

on:
  workflow_dispatch:
    inputs:
      voice_name:
        description: 'Voice Name (from Kyutai)'
        required: true
        default: 'Show host (US, m)'

jobs:
  analyze-text:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - id: set-matrix
        run: |
          echo "matrix=$(python3 setup_jobs.py)" >> $GITHUB_OUTPUT

  generate-voice:
    needs: analyze-text
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk_id: ${{ fromJson(needs.analyze-text.outputs.matrix) }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          
      - name: Run TTS Worker
        env:
          CHUNK_ID: ${{ matrix.chunk_id }}
          VOICE_NAME: ${{ github.event.inputs.voice_name }}
          # Account rotation logic: Use Account ID based on chunk (0 to 5)
          ACCOUNT_INDEX: ${{ matrix.chunk_id % 6 }}
        run: |
          echo "Processing Chunk ID: $CHUNK_ID"
          xvfb-run --server-args="-screen 0 1280x800x24 -ac" --auto-servernum -- node automation/tts-recorder.js
          
      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-chunk-${{ matrix.chunk_id }}
          path: downloads/*.wav
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screens-${{ matrix.chunk_id }}
          path: downloads/*.png
          retention-days: 1
          if-no-files-found: ignore
